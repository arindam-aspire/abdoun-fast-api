services:
  api:
    image: ${DOCKER_IMAGE_NAME:-realestate_api}:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realestate_api
    # Removed depends_on db since we're using local database
    env_file:
      - .env
    environment:
      # Database Configuration - Default uses host.docker.internal for Docker
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/realestate}
      
      # Application Configuration
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - RELOAD=${RELOAD:-false}
      
      # Environment
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - DEBUG=${DEBUG:-false}
      
      # AWS Cognito Configuration
      - COGNITO_REGION=${COGNITO_REGION:-}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID:-}
      - COGNITO_APP_CLIENT_SECRET=${COGNITO_APP_CLIENT_SECRET:-}
      
      # AWS Credentials (required for admin operations like creating users)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # Uvicorn Workers (for production)
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # For development: mount app directory for hot reload (remove in production)
      - ./app:/app/app:ro
      - ./logs:/app/logs
    networks:
      - realestate_network
    command: >
      sh -c "
      if [ \"$$RELOAD\" = \"true\" ]; then
        uvicorn app.main:app --host $$HOST --port $$PORT --reload
      else
        uvicorn app.main:app --host $$HOST --port $$PORT --workers $$UVICORN_WORKERS
      fi
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  realestate_network:
    driver: bridge







